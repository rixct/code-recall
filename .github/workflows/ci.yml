name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      # Runs the parser/scheduler/grader suite. The native-C++ test compiles
      # with the g++ that ships on ubuntu-latest; others are pure JS.
      - run: npm test

      # Type-check + production bundle.
      - run: npm run build
