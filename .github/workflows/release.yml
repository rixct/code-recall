name: Release plugin

# Cut a release by pushing a semver tag that equals manifest.json, e.g.:
#   npm version patch    # bumps package.json + manifest.json + versions.json
#   git push && git push --tags
on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write
  id-token: write # required for build provenance attestations
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Verify tag matches manifest version
        run: |
          MANIFEST_VERSION="$(node -p "require('./manifest.json').version")"
          if [ "$GITHUB_REF_NAME" != "$MANIFEST_VERSION" ]; then
            echo "Tag ($GITHUB_REF_NAME) != manifest.json version ($MANIFEST_VERSION)" >&2
            echo "Run 'npm version <x.y.z>' before tagging." >&2
            exit 1
          fi

      - run: npm test

      - run: npm run build

      # Cryptographic provenance for the release assets.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Create GitHub release with plugin assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            main.js manifest.json styles.css
